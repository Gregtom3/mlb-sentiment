name: Deploy Dashboard
# Rebuilds the JSON payloads from the committed Parquet and publishes the
# static site to GitHub Pages. Free, no server, no cold starts.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/**"
      - "pipeline/**"
      - ".github/workflows/deploy.yml"
  # The daily refresh commits data using GITHUB_TOKEN, whose pushes do not
  # trigger other workflows — so deploy when the refresh run finishes instead.
  workflow_run:
    workflows: ["Daily Data Refresh"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # When chained from the refresh run, only deploy if it succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build site data
        run: |
          python -m pip install --upgrade pip
          pip install duckdb pandas pyarrow numpy
          python pipeline/build_site_data.py --data data --out site/data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
