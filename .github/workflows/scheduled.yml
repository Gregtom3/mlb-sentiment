name: Daily Data Refresh
# Fetches the previous day's Reddit + MLB data for each tracked team, writes
# Parquet under data/<TEAM>/, and commits it back to main. The commit to
# data/** triggers the Deploy Dashboard workflow, which rebuilds and publishes
# the static site. No Azure, no database.
on:
  schedule:
    - cron: "0 10 * * *" # 6am Eastern (10am UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[models]
          pip install -r requirements.txt

      - name: Fetch yesterday's data
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: |
          TEAMS=$(python -c "from mlb_sentiment.info import PROCESSED_TEAMS; print(' '.join(PROCESSED_TEAMS))")
          echo "Fetching ${TEAMS}"
          for TEAM in $TEAMS; do
            echo "::group::$TEAM"
            mlb-sentiment upload --team-acronym "$TEAM" --yesterday \
              --comments-limit 0 --sentiment-model twitter-roberta-base-sentiment || true
            echo "::endgroup::"
          done

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily data refresh ($(date -u +%F))"
          git push
