name: Daily Data Refresh
# Fetches the previous day's Reddit + MLB data for each tracked team, writes
# Parquet under data/<TEAM>/, and commits it back to main. The commit to
# data/** triggers the Deploy Dashboard workflow, which rebuilds and publishes
# the static site. No Azure, no database.
on:
  schedule:
    - cron: "0 10 * * *" # ~6am Eastern (10:00 UTC; = 6am EDT / 5am EST)
  workflow_dispatch:
    inputs:
      days:
        description: "How many past days to fetch (1 = just yesterday; use 3 to backfill)"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[models]
          pip install -r requirements.txt

      - name: Fetch recent data
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: |
          DAYS="${{ github.event.inputs.days || '1' }}"
          TEAMS=$(python -c "from mlb_sentiment.info import PROCESSED_TEAMS; print(' '.join(PROCESSED_TEAMS))")
          echo "Fetching last ${DAYS} day(s) for: ${TEAMS}"
          for i in $(seq 1 "$DAYS"); do
            DATE=$(date -u -d "${i} days ago" +%m/%d/%Y)
            echo "::group::${DATE}"
            for TEAM in $TEAMS; do
              mlb-sentiment upload --team-acronym "$TEAM" --date "$DATE" \
                --comments-limit 0 --sentiment-model twitter-roberta-base-sentiment || true
            done
            echo "::endgroup::"
          done

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Data refresh ($(date -u +%F))"
          git push
